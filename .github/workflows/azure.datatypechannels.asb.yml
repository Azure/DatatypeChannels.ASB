name: public/Azure.DatatypeChannels.ASB
on:
  push:
    branches:
    - master
    tags:
    - "*"
  pull_request_target:
    branches:
    - master
env:
  BUILD_NUMBER: "${{ github.run_number }}"
permissions:
  id-token: write
  contents: read
jobs:
  build:
    if: github.repository == 'Azure/DatatypeChannels.ASB'
    runs-on: ubuntu-latest
    environment: 
      name: build
    steps:
    - name: checkout
      uses: actions/checkout@v4.1.0
    - uses: actions/setup-dotnet@v4.0.0
      with:
        global-json-file: global.json
    - name: Login to Azure
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.CLIENT_ID }}
        tenant-id: ${{ secrets.TENANT_ID }}
        subscription-id: ${{ secrets.SUBSCRIPTION_ID }}
    - name: Restore tools
      run: dotnet tool restore
    - name: Build
      run: dotnet fsi build.fsx -t ci
      env:
        servicePrincipalId: ${{ secrets.CLIENT_ID }}

  release:
    needs: build
    if: github.repository == 'Azure/DatatypeChannels.ASB' && startsWith(github.ref, 'refs/tags')
    runs-on: ubuntu-latest
    environment: 
      name: release
    steps:
    - name: checkout
      uses: actions/checkout@v4.1.0
    - uses: actions/setup-dotnet@v4.0.0
      with:
        global-json-file: global.json
    - name: Publish
      env:
        NUGET_REPO_KEY: "${{ secrets.NUGET_REPO_KEY }}"
        NUGET_REPO_URL: "${{ vars.NUGET_REPO_URL }}"
      run: dotnet fsi build.fsx -t release
